<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Transaction Entry Form</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f2;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-em: rgba(0,0,0,0.2);
    --text: #1a1a1a;
    --text-muted: #666;
    --text-hint: #999;
    --radius: 10px;
    --radius-sm: 7px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem 4rem; }
  .page { width: 100%; max-width: 560px; }
  .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 1.75rem; }
  .brand-icon { width: 42px; height: 42px; border-radius: 11px; background: #1a1a2e; display: flex; align-items: center; justify-content: center; }
  .brand-icon i { color: #7eb8f7; font-size: 20px; }
  .brand-title { font-size: 19px; font-weight: 600; color: var(--text); }
  .brand-sub { font-size: 12px; color: var(--text-hint); margin-top: 2px; }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.75rem; }
  .card-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .card-sub { font-size: 13px; color: var(--text-muted); margin-top: 3px; margin-bottom: 1.5rem; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: var(--text-hint); text-transform: uppercase; margin-bottom: 1rem; }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 9px 12px;
    border: 0.5px solid var(--border-em);
    border-radius: var(--radius-sm);
    font-size: 14px; background: var(--surface); color: var(--text);
    font-family: inherit; outline: none; transition: border-color 0.15s, box-shadow 0.15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: #378add;
    box-shadow: 0 0 0 3px rgba(55,138,221,0.12);
  }
  .field textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .amount-wrap { position: relative; }
  .amount-prefix { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-hint); pointer-events: none; }
  .amount-wrap input { padding-left: 26px; }
  .type-row { display: flex; gap: 8px; height: 38px; }
  .type-btn { flex: 1; border: 0.5px solid var(--border-em); border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; background: transparent; color: var(--text-muted); transition: all 0.15s; font-family: inherit; }
  .type-btn.active-credit { background: #eaf3de; border-color: #3b6d11; color: #27500a; }
  .type-btn.active-debit { background: #fcebeb; border-color: #a32d2d; color: #791f1f; }
  .divider { height: 0.5px; background: var(--border); margin: 1.25rem 0; }
  .submit-btn {
    width: 100%; padding: 12px;
    background: #1a1a2e; color: #e8f0fe;
    border: none; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: opacity 0.15s;
    margin-top: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .submit-btn:hover { opacity: 0.88; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .success-box { display: none; background: #eaf3de; border: 0.5px solid #3b6d11; border-radius: var(--radius-sm); padding: 12px 16px; font-size: 13px; color: #27500a; margin-top: 1rem; align-items: center; gap: 8px; }
  .success-box.show { display: flex; }
  .error-box { display: none; background: #fcebeb; border: 0.5px solid #a32d2d; border-radius: var(--radius-sm); padding: 12px 16px; font-size: 13px; color: #791f1f; margin-top: 1rem; }
  .error-box.show { display: block; }
  .sheet-note { font-size: 11px; color: var(--text-hint); text-align: center; margin-top: 1rem; display: flex; align-items: center; justify-content: center; gap: 5px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 480px) { .row2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="page">
  <div class="brand">
    <div class="brand-icon"><i class="ti ti-report-money"></i></div>
    <div>
      <div class="brand-title">Transaction Log</div>
      <div class="brand-sub">Entries go directly to the Google Sheet</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">New transaction</div>
    <div class="card-sub">Fill in the details below and hit submit</div>

    <div class="section-label">Transaction details</div>

    <div class="field">
      <label>Date</label>
      <input type="date" id="txn-date" />
    </div>

    <div class="row2">
      <div class="field">
        <label>Amount</label>
        <div class="amount-wrap">
          <span class="amount-prefix">$</span>
          <input type="number" id="txn-amount" placeholder="0.00" step="0.01" min="0" />
        </div>
      </div>
      <div class="field">
        <label>Type</label>
        <div class="type-row">
          <button class="type-btn active-credit" id="btn-credit" onclick="setType('credit')">Credit</button>
          <button class="type-btn" id="btn-debit" onclick="setType('debit')">Debit</button>
        </div>
      </div>
    </div>

    <div class="field">
      <label>Reason / description</label>
      <textarea id="txn-reason" placeholder="What was this transaction for?"></textarea>
    </div>

    <div class="divider"></div>
    <div class="section-label">Requested by</div>

    <div class="row2">
      <div class="field">
        <label>Full name</label>
        <input type="text" id="req-name" placeholder="e.g. Gaurav Sharma" />
      </div>
      <div class="field">
        <label>Contact / email</label>
        <input type="text" id="req-contact" placeholder="email or phone" />
      </div>
    </div>

    <div class="field">
      <label>Department / role (optional)</label>
      <input type="text" id="req-dept" placeholder="e.g. Finance, Admin…" />
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitForm()">
      <i class="ti ti-send"></i>
      Submit transaction
    </button>

    <div class="success-box" id="success-box">
      <i class="ti ti-circle-check"></i>
      Transaction saved to Google Sheet successfully!
    </div>
    <div class="error-box" id="error-box"></div>
  </div>

  <div class="sheet-note">
    <i class="ti ti-table" style="font-size:13px"></i>
    Linked to your Google Sheet
  </div>
</div>

<script>
  // =====================================================
  //  PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL BELOW
  // =====================================================
  const APPS_SCRIPT_URL = 'PASTE_YOUR_URL_HERE';
  // =====================================================

  let txnType = 'credit';

  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('txn-date').value = new Date().toISOString().split('T')[0];
  });

  function setType(type) {
    txnType = type;
    document.getElementById('btn-credit').className = 'type-btn' + (type === 'credit' ? ' active-credit' : '');
    document.getElementById('btn-debit').className = 'type-btn' + (type === 'debit' ? ' active-debit' : '');
  }

  async function submitForm() {
    const date     = document.getElementById('txn-date').value;
    const amount   = document.getElementById('txn-amount').value;
    const reason   = document.getElementById('txn-reason').value.trim();
    const name     = document.getElementById('req-name').value.trim();
    const contact  = document.getElementById('req-contact').value.trim();
    const dept     = document.getElementById('req-dept').value.trim();

    document.getElementById('success-box').classList.remove('show');
    document.getElementById('error-box').classList.remove('show');

    if (!date || !amount || !reason || !name) {
      showError('Please fill in date, amount, reason, and requester name.');
      return;
    }

    if (APPS_SCRIPT_URL === 'PASTE_YOUR_URL_HERE') {
      showError('Apps Script URL not configured. Open the HTML file and paste your URL where it says PASTE_YOUR_URL_HERE.');
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<i class="ti ti-loader" style="animation:spin 0.8s linear infinite"></i> Submitting…';

    const payload = {
      date,
      amount: parseFloat(amount).toFixed(2),
      type: txnType,
      reason,
      requestedBy: name,
      contact,
      department: dept
    };

    try {
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      document.getElementById('success-box').classList.add('show');
      document.getElementById('txn-amount').value = '';
      document.getElementById('txn-reason').value = '';
      document.getElementById('req-name').value = '';
      document.getElementById('req-contact').value = '';
      document.getElementById('req-dept').value = '';
      setType('credit');

    } catch (e) {
      showError('Submission failed — check your Apps Script URL and network connection.');
    }

    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-send"></i> Submit transaction';
  }

  function showError(msg) {
    const el = document.getElementById('error-box');
    el.textContent = msg;
    el.classList.add('show');
  }
</script>
</body>
</html>
